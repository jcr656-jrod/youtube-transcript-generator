<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Transcript Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            color: white;
            margin: 40px 20px;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .form {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .input {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 15px;
            font-family: 'Courier New', monospace;
        }

        .input:focus {
            outline: none;
            border-color: #667eea;
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .select, .button {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
        }

        .select:focus {
            outline: none;
            border-color: #667eea;
        }

        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .results {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
        }

        .results.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .meta {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
        }

        .meta p {
            margin: 0;
            font-size: 14px;
        }

        .section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .section h2 {
            font-size: 1.5em;
            margin-bottom: 15px;
            color: #667eea;
        }

        .summary-text {
            font-size: 1.1em;
            line-height: 1.6;
            color: #555;
            margin-bottom: 10px;
        }

        .key-points {
            list-style: none;
        }

        .key-points li {
            padding: 10px;
            margin: 8px 0;
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            border-radius: 4px;
        }

        .tweets {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
        }

        .tweet {
            background: white;
            padding: 12px;
            margin: 8px 0;
            border-radius: 4px;
            border-left: 4px solid #667eea;
            font-size: 14px;
            line-height: 1.5;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
            display: none;
        }

        .error.show {
            display: block;
        }

        .loading {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .copy-btn {
            margin-top: 10px;
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .copy-btn:hover {
            background: #764ba2;
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 2em; }
            .controls { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 YouTube Transcript Generator</h1>
            <p>Paste a YouTube URL and get summaries, Twitter threads, and more in seconds.</p>
        </div>

        <div id="errorDiv" class="error"></div>

        <form id="form" class="form">
            <input
                id="url"
                type="text"
                placeholder="https://youtu.be/vB08-7RzgOs"
                class="input"
                required
            />

            <div class="controls">
                <select id="analysisType" class="select">
                    <option value="full">Full Analysis</option>
                    <option value="summary">Summary Only</option>
                    <option value="threads">Twitter Threads</option>
                    <option value="show_notes">Show Notes</option>
                </select>

                <button type="submit" class="button">✨ Transcribe & Analyze</button>
            </div>
        </form>

        <div id="results" class="results">
            <div class="meta" id="meta"></div>
            <div id="content"></div>
        </div>
    </div>

    <script>
        const API_URL = '/api';

        document.getElementById('form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const url = document.getElementById('url').value;
            const analysisType = document.getElementById('analysisType').value;
            const errorDiv = document.getElementById('errorDiv');
            const resultsDiv = document.getElementById('results');
            const button = e.target.querySelector('button');

            errorDiv.classList.remove('show');
            resultsDiv.classList.remove('show');

            if (!url.trim()) {
                errorDiv.textContent = '❌ Error: Please enter a YouTube URL';
                errorDiv.classList.add('show');
                return;
            }

            button.disabled = true;
            button.classList.add('loading');

            try {
                const response = await fetch(`${API_URL}/transcribe`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url.trim(), analysis_type: analysisType })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || 'Transcription failed');
                }

                const data = await response.json();
                displayResults(data);
            } catch (error) {
                errorDiv.textContent = `❌ Error: ${error.message}`;
                errorDiv.classList.add('show');
            } finally {
                button.disabled = false;
                button.classList.remove('loading');
            }
        });

        function displayResults(data) {
            const meta = document.getElementById('meta');
            const content = document.getElementById('content');
            const resultsDiv = document.getElementById('results');

            meta.innerHTML = `
                <p><strong>Method:</strong> ${data.method}</p>
                <p><strong>Time:</strong> ${data.processing_time}s</p>
                <p><strong>Cost:</strong> $${data.cost.toFixed(4)}</p>
            `;

            let html = '';

            if (data.analysis.summary) {
                html += `
                    <div class="section">
                        <h2>📝 Summary</h2>
                        <p class="summary-text">${data.analysis.summary}</p>
                        <button class="copy-btn" onclick="copyText(\`${data.analysis.summary.replace(/`/g, '\\`')}\`)">Copy</button>
                    </div>
                `;
            }

            if (data.analysis.key_points) {
                html += '<div class="section"><h2>🎯 Key Points</h2><ul class="key-points">';
                data.analysis.key_points.forEach(point => {
                    html += `<li>${point}</li>`;
                });
                html += '</ul></div>';
            }

            if (data.analysis.twitter_threads?.thread_5) {
                html += '<div class="section"><h2>🐦 Twitter Threads</h2><div class="tweets">';
                data.analysis.twitter_threads.thread_5.forEach((tweet, i) => {
                    html += `<div class="tweet"><strong>${i + 1}.</strong> ${tweet}</div>`;
                });
                html += '</div></div>';
            }

            if (data.analysis.seo_metadata) {
                const seo = data.analysis.seo_metadata;
                html += `
                    <div class="section">
                        <h2>🔍 SEO Metadata</h2>
                        <p><strong>Title:</strong> ${seo.title}</p>
                        <p><strong>Description:</strong> ${seo.description}</p>
                        <p><strong>Keywords:</strong> ${seo.keywords.join(', ')}</p>
                    </div>
                `;
            }

            content.innerHTML = html;
            resultsDiv.classList.add('show');
        }

        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('Copied to clipboard!');
            });
        }
    </script>
</body>
</html>
